<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📹</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header bar -->
    <header id="header">
        <div class="header-left">
            <h1 id="dashboard-title">Security Dashboard</h1>
        </div>
        <div class="header-center" id="clock-container">
            <div id="time-display"></div>
            <div id="date-display"></div>
        </div>
        <div class="header-right" id="weather-container">
            <div id="weather-icon"></div>
            <div id="weather-temp"></div>
            <div id="weather-desc"></div>
        </div>
    </header>

    <!-- Main camera grid -->
    <main id="camera-grid">
        <!-- Tiles are generated by dashboard.js -->
    </main>

    <!-- Footer status bar -->
    <footer id="footer">
        <div id="status-left">
            <span id="camera-count"></span>
            <span id="connection-status"></span>
        </div>
        <div id="status-right">
            <span id="last-updated"></span>
            <span id="refresh-timer"></span>
        </div>
    </footer>

    <!-- Loading overlay -->
    <div id="loading-overlay">
        <div class="loader">
            <div class="spinner"></div>
            <p>Loading cameras...</p>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
